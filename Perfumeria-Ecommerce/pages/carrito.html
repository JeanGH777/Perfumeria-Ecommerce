<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <link rel="stylesheet" href="../styles/carrito.css">
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="logo">✨  Perfumería Dubái</div>
        <nav>
            <ul>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="carrito.html"class="active">Carrito</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Tu Carrito de Compras</h1>
        
        <!-- Tabla de productos en el carrito -->
        <table id="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Precio Unitario</th>
                    <th>Total</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Aquí se listarán los productos que el usuario haya agregado -->
                <tr>
                    <td>Hamburguesa</td>
                    <td>
                        <input type="number" value="1" min="1" class="cantidad" data-precio="11" onchange="actualizarTotal()">
                    </td>
                    <td>S/ 11</td>
                    <td class="total">S/ 11</td>
                    <td><button onclick="eliminarProducto(this)">Eliminar</button></td>
                </tr>
                <tr>
                    <td>Salchipapa</td>
                    <td>
                        <input type="number" value="2" min="1" class="cantidad" data-precio="10" onchange="actualizarTotal()">
                    </td>
                    <td>S/ 10</td>
                    <td class="total">S/ 20</td>
                    <td><button onclick="eliminarProducto(this)">Eliminar</button></td>
                </tr>
                <!-- Otros productos se agregarían aquí -->
            </tbody>
        </table>

        <!-- Total general -->
        <div id="total-carrito">
            <h2>Total: <span id="total-suma">S/ 31</span></h2>
        </div>

        <!-- Botones para continuar -->
        <div id="acciones">
            <button onclick="window.location.href='index.html'">Seguir Comprando</button>
            <button onclick="window.location.href='checkout.html'">Proceder a Checkout</button>
        </div>
    </main>

     <!-- FOOTER -->
  <footer>
    <p>&copy; 2025 Perfumería Dubái. Todos los derechos reservados.</p>
  </footer>

    <script src="script.js"></script>
</body>
</html>
